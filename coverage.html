<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Algebra OS | Coverage Report</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f7fb;
  color:#0f172a;
  margin:0;
  padding:30px;
}
.card{
  background:white;
  border-radius:20px;
  padding:24px;
  box-shadow:0 12px 35px rgba(15,23,42,.08);
  margin-bottom:20px;
}
h1{margin-top:0}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-weight:bold;
  font-size:12px;
}
.ready{background:#dcfce7;color:#166534}
.missing{background:#fee2e2;color:#991b1b}
table{
  width:100%;
  border-collapse:collapse;
  background:white;
}
th,td{
  border-bottom:1px solid #e2e8f0;
  padding:12px;
  text-align:left;
  vertical-align:top;
}
th{background:#f8fafc}
code{
  background:#f1f5f9;
  padding:3px 6px;
  border-radius:6px;
}
.btn{
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  padding:12px 18px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
  <h1>Algebra OS Coverage Report</h1>
  <p>This page scans <code>algebra1.json</code> and verifies whether every lesson has working question generators.</p>
  <button class="btn" onclick="runCoverage()">Run Coverage Report</button>
</div>

<div id="summary" class="card">Click Run Coverage Report.</div>
<div id="report" class="card"></div>

<script type="module">
import {
  buildCoverageReport,
  summarizeCoverage
} from "./engine/coverageEngine.js";

async function runCoverage(){
  const rows = await buildCoverageReport();
  const summary = summarizeCoverage(rows);

  document.getElementById("summary").innerHTML = `
    <h2>Summary</h2>
    <p><strong>Total Lessons:</strong> ${summary.totalLessons}</p>
    <p><strong>Ready Lessons:</strong> ${summary.readyLessons}</p>
    <p><strong>Missing Lessons:</strong> ${summary.missingLessons}</p>
    <p><strong>Total Problem Types:</strong> ${summary.totalProblemTypes}</p>
    <p><strong>Missing Problem Types:</strong> ${summary.missingProblemTypes.length ? summary.missingProblemTypes.join(", ") : "None"}</p>
  `;

  document.getElementById("report").innerHTML = `
    <h2>Lesson-by-Lesson Coverage</h2>
    <table>
      <thead>
        <tr>
          <th>Lesson</th>
          <th>Title</th>
          <th>Problem Types</th>
          <th>Status</th>
          <th>Missing</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(row => `
          <tr>
            <td>${row.lessonId}</td>
            <td>${row.lessonTitle}</td>
            <td>${row.problemTypes.map(t => `<code>${t}</code>`).join("<br>")}</td>
            <td>
              <span class="badge ${row.status === "READY" ? "ready" : "missing"}">
                ${row.status}
              </span>
            </td>
            <td>${row.missing.length ? row.missing.map(t => `<code>${t}</code>`).join("<br>") : "—"}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

window.runCoverage = runCoverage;
</script>

</body>
</html>
